server:
  port: ${PRODUCT_SERVICE_PORT:8184}

logging:
  level:
    com.berkay: ${LOG_LEVEL:DEBUG}

# ProductServiceConfigData sınıfındaki alanlar
product-service:
  #isimlerin sol tarafı (örn: order-created-topic-name), Java kodun içindeki değişken isimlerindir
  # Sağ tarafı ise (örn: order-created), Kafka'da fiziksel olarak yaratılmış olan kanalın (Topic) adıdır
  product-created-topic-name: product-created
  product-stock-reserved-topic-name: product-stock-reserved
  product-stock-failed-topic-name: product-stock-failed
  order-created-topic-name: order-created
  order-cancelled-topic-name: order-cancelled
  # OutboxScheduler içerisindeki @Scheduled parametreleri
  outbox-scheduler-fixed-rate: 10000
  outbox-scheduler-initial-delay: 10000


spring:
  application:
    name: product-service
  jpa:
    open-in-view: false
    show-sql: ${SHOW_SQL:true}
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: none # Migration için V1__init.sql yazmıştık, Hibernate tablo yaratmasın.
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  datasource:
    url: jdbc:postgresql://${MASTER_PRIVATE_IP:localhost}:${DB_PORT:5432}/n11_db?currentSchema=product&binaryTransfer=true&reWriteBatchedInserts=true&stringtype=unspecified
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:admin}
    driver-class-name: org.postgresql.Driver

  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 1
    schemas: product
    locations: classpath:db/migration

# Ortak Kafka Konfigürasyonu
kafka-config:
  #bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:31091,localhost:31092,localhost:31093}
  bootstrap-servers: localhost:19092, localhost:29092, localhost:39092
  #schema-registry-url: ${SCHEMA_REGISTRY_URL:http://localhost:30081}
  schema-registry-url: http://localhost:8081
  schema-registry-url-key: schema.registry.url
  num-of-partitions: 3
  replication-factor: 3

# ProductStockReservedKafkaPublisher KafkaTemplate<String, String> kullanıyor.
# Bu yüzden value-serializer StringSerializer olmalı.
kafka-producer-config:
  key-serializer-class: org.apache.kafka.common.serialization.StringSerializer
  value-serializer-class: io.confluent.kafka.serializers.KafkaAvroSerializer
  compression-type: ${KAFKA_PRODUCER_CONFIG_COMPRESSION_TYPE:none}
  acks: all
  batch-size: 16384
  batch-size-boost-factor: 100
  linger-ms: 5
  request-timeout-ms: 60000
  retry-count: 5

# OrderCreatedKafkaListener ve OrderCancelledKafkaListener sınıflarının beklediği Consumer ayarları
kafka-consumer-config:
  key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
  value-deserializer: io.confluent.kafka.serializers.KafkaAvroDeserializer
  # Dinleyicilerin @KafkaListener(id = "...") kısımları
  order-created-consumer-group-id: product-order-created-topic-consumer
  order-cancelled-consumer-group-id: product-order-cancelled-topic-consumer
  # Diğer standart consumer ayarları
  auto-offset-reset: earliest
  specific-avro-reader-key: specific.avro.reader
  specific-avro-reader: true
  batch-listener: true
  auto-startup: true
  concurrency-level: 3
  session-timeout-ms: 10000
  heartbeat-interval-ms: 3000
  max-poll-interval-ms: 300000
  max-poll-records: 500
  max-partition-fetch-bytes-default: 1048576
  max-partition-fetch-bytes-boost-factor: 1
  poll-timeout-ms: 150



  # ====================================================================================
  # KAFKA EVENT AKIŞI VE İSİMLENDİRME MANTIGI (SİSTEMİN ÇALIŞMA PRENSİBİ)
  # ====================================================================================
  # 1) Order mikroservisi sipariş oluşturduktan sonra event yayınlamak ister.
  #    Kendi yml dosyasına gider ve order-service tag'ından "order-created"
  #    string'ini okur. Bu Topic Name'dir (Kanal/Klasör adı).
  #
  # 2) Kafka mesajı alır. Durum kabaca şudur: Topic="order-created",
  #    Mesaj={Key: SagaID/OrderID, Value: [Avro_Object]}.
  #    Key olarak id verilmesi, Kafka'nın aynı siparişe ait mesajları sıraya
  #    dizmesini ve sıranın asla şaşmamasını sağlar.
  #
  # 3) Product mikroservisi bu kanalı dinlemek ister ve @KafkaListener kullanır.
  #    Listener ile Kafka'ya göndereceği 'id' kendi özel departman adıdır (kimliğidir).
  #    Bu projede bu isim: 'product-order-created-topic-consumer'
  #
  # 4) Kafka, 'product-order-created-topic-consumer' adını gördüğünde bunu
  #    bağımsız bir dinleyici grup (Consumer Group) olarak tanır ve kaydeder.
  #
  # 5) Product servisi, kimliği (id) dışında dinleyeceği kanalı (topic) da belirtir:
  #    "Benim adım product-order-created..., bana order-created kanalını ver."
  #
  # 6) Kafka, bu Consumer Group ('product-order-created-topic-consumer') için
  #    'order-created' topic'ine özel bir "Kaldığı Yer (Offset)" numarası oluşturur
  #    ve veritabanında (gizli __consumer_offsets kanalında) tutar.
  #    SONUÇ: Sistem çökerse veya yeniden başlarsa, Spring Boot ayağa kalktığında
  #    Kafka'ya gidip kimliğini söyler. Kafka da "En son 1453. mesajda kalmıştın,
  #    al bu da 1454. mesaj" diyerek veri kaybını engeller (Fault Tolerance).
  # ====================================================================================


